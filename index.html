<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高解像度チェキメーカー</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kiwi Maru', sans-serif; text-align: center; background: #e0e0e0; padding: 20px; }
        .controls { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; margin-bottom: 20px; text-align: left; }
        
        /* 画面上での見た目を制限（ここが重要） */
        #canvas { 
            background: #fff; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            border-radius: 5px; 
            max-width: 500px; /* 画面上では500px幅で見せる */
            width: 100%;      /* スマホ対応 */
            height: auto; 
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8em; margin-bottom: 5px; color: #666; }
        textarea, input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 250px; font-family: 'Kiwi Maru', sans-serif; }
        button { padding: 10px 20px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; display: block; width: 100%; }
    </style>
</head>
<body>

<div class="controls">
    <div class="control-group">
        <label>写真を選択</label>
        <input type="file" id="upload" accept="image/*">
    </div>
    <div class="control-group">
        <label>メッセージ</label>
        <textarea id="textInput" placeholder="メッセージを入力"></textarea>
    </div>
    <div class="control-group">
        <label>日付</label>
        <input type="text" id="dateInput" placeholder="2026.03.02">
    </div>
    <button id="downloadBtn">高画質で保存する</button>
</div>

<br>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const textInput = document.getElementById('textInput');
    const dateInput = document.getElementById('dateInput');
    const downloadBtn = document.getElementById('downloadBtn');

    // ★ 解像度を 2400px に設定（800pxの3倍）
    // これにより、保存したときに非常に精細になります。
    const baseSize = 2400; 
    canvas.width = baseSize;
    canvas.height = baseSize;

    let currentImg = null;

    function draw() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 各マージンやサイズも 3倍（baseSizeに比例）させる
        const scale = baseSize / 800; 
        const margin = 60 * scale;
        const photoBoxW = canvas.width - (margin * 2);
        const photoBoxH = canvas.height - (240 * scale);

        if (currentImg) {
            let drawW = photoBoxW;
            let drawH = photoBoxW / (currentImg.width / currentImg.height);
            if (drawH > photoBoxH) {
                drawH = photoBoxH;
                drawW = photoBoxH * (currentImg.width / currentImg.height);
            }
            const x = margin + (photoBoxW - drawW) / 2;
            const y = margin + (photoBoxH - drawH) / 2;
            ctx.drawImage(currentImg, x, y, drawW, drawH);
        }

        // メッセージ描画（サイズ計算をscaleに合わせる）
        const text = textInput.value;
        const footerY = canvas.height - (180 * scale);
        const footerMaxH = 140 * scale;

        if (text) {
            const lines = text.split('\n');
            let fontSize = 45 * scale;
            const lineHeightRatio = 1.3;

            ctx.font = `${fontSize}px 'Kiwi Maru'`;
            while (fontSize > 15 * scale) {
                const totalHeight = lines.length * fontSize * lineHeightRatio;
                const maxWidth = Math.max(...lines.map(l => ctx.measureText(l).width));
                if (totalHeight <= footerMaxH && maxWidth <= photoBoxW) break;
                fontSize -= 2 * scale;
                ctx.font = `${fontSize}px 'Kiwi Maru'`;
            }

            ctx.fillStyle = "#444";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const startY = footerY + (footerMaxH / 2) - ((lines.length - 1) * fontSize * lineHeightRatio) / 2;

            lines.forEach((line, i) => {
                ctx.fillText(line, canvas.width / 2, startY + (i * fontSize * lineHeightRatio));
            });
        }

        // 日付
        const dateText = dateInput.value;
        if (dateText) {
            ctx.fillStyle = "#666";
            ctx.font = `${24 * scale}px 'Kiwi Maru'`;
            ctx.textAlign = "right";
            ctx.textBaseline = "bottom";
            ctx.fillText(dateText, canvas.width - (40 * scale), canvas.height - (30 * scale));
        }
    }

    upload.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                currentImg = img;
                draw();
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    textInput.addEventListener('input', draw);
    dateInput.addEventListener('input', draw);

    downloadBtn.addEventListener('click', () => {
        // 保存時は高品質なPNG（またはJPEG）として出力
        const link = document.createElement('a');
        link.download = `high_res_photo_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    });

    draw();
</script>
</body>
</html>
