<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>手書き対応チェキメーカー</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kiwi Maru', sans-serif; text-align: center; background: #e0e0e0; padding: 10px; margin: 0; }
        .controls { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; margin-bottom: 15px; text-align: left; max-width: 90%; }
        #canvas { 
            background: #fff; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            border-radius: 5px; 
            max-width: 500px; 
            width: 100%; 
            height: auto; 
            touch-action: none; /* スマホのスクロールを防止 */
            cursor: crosshair;
        }
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.8em; margin-bottom: 3px; color: #666; }
        input[type="file"], textarea, input[type="text"] { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Kiwi Maru', sans-serif; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        button { flex: 1; padding: 10px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button.secondary { background: #888; }
    </style>
</head>
<body>

<div class="controls">
    <div class="control-group"><label>1. 写真選択</label><input type="file" id="upload" accept="image/*"></div>
    <div class="control-group"><label>2. メッセージ（テキスト）</label><textarea id="textInput" placeholder="入力または下部に直接手書き"></textarea></div>
    <div class="control-group"><label>3. 日付</label><input type="text" id="dateInput" placeholder="2026.03.03"></div>
    <div class="btn-group">
        <button id="clearDrawBtn" class="secondary">手書きを消去</button>
        <button id="downloadBtn">保存する</button>
    </div>
</div>

<br>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const textInput = document.getElementById('textInput');
    const dateInput = document.getElementById('dateInput');
    const clearDrawBtn = document.getElementById('clearDrawBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    const baseSize = 2400; 
    canvas.width = baseSize;
    canvas.height = baseSize;

    let currentImg = null;
    let isDrawing = false;
    let drawingData = []; // 手書きのストロークを保存

    // 再描画のメイン関数
    function render() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const scale = baseSize / 800;
        const margin = 60 * scale;
        const photoBoxW = canvas.width - (margin * 2);
        const photoBoxH = canvas.height - (240 * scale);

        // 1. 画像描画
        if (currentImg) {
            let drawW = photoBoxW, drawH = photoBoxW / (currentImg.width / currentImg.height);
            if (drawH > photoBoxH) { drawH = photoBoxH; drawW = photoBoxH * (currentImg.width / currentImg.height); }
            ctx.drawImage(currentImg, margin + (photoBoxW - drawW) / 2, margin + (photoBoxH - drawH) / 2, drawW, drawH);
        }

        // 2. テキスト描画 (自動サイズ調整)
        const text = textInput.value;
        if (text) {
            const lines = text.split('\n');
            let fontSize = 45 * scale;
            ctx.font = `${fontSize}px 'Kiwi Maru'`;
            ctx.fillStyle = "#444"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            const startY = (canvas.height - 110 * scale);
            lines.forEach((line, i) => ctx.fillText(line, canvas.width/2, startY + (i*fontSize*1.3)));
        }

        // 3. 日付描画
        if (dateInput.value) {
            ctx.fillStyle = "#666"; ctx.font = `${24 * scale}px 'Kiwi Maru'`;
            ctx.textAlign = "right"; ctx.textBaseline = "bottom";
            ctx.fillText(dateInput.value, canvas.width - 40 * scale, canvas.height - 30 * scale);
        }

        // 4. 手書きデータの描画
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.strokeStyle = "#444";
        ctx.lineWidth = 5 * scale;
        
        drawingData.forEach(path => {
            if (path.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(path[i].x, path[i].y);
            }
            ctx.stroke();
        });
    }

    // --- 手書きイベント処理 ---
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        // 画面上の座標をキャンバス解像度(2400px)に変換
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function startDraw(e) {
        isDrawing = true;
        drawingData.push([getPos(e)]);
        e.preventDefault();
    }

    function doDraw(e) {
        if (!isDrawing) return;
        drawingData[drawingData.length - 1].push(getPos(e));
        render();
        e.preventDefault();
    }

    function stopDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', doDraw);
    window.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', startDraw);
    canvas.addEventListener('touchmove', doDraw);
    canvas.addEventListener('touchend', stopDraw);

    clearDrawBtn.addEventListener('click', () => { drawingData = []; render(); });
    upload.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentImg = new Image();
            currentImg.onload = render;
            currentImg.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });
    textInput.addEventListener('input', render);
    dateInput.addEventListener('input', render);
    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `my_cheki_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

    render();
</script>
</body>
</html>
